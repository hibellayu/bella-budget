  {id:'o5',name:'еҒҘиә«ж•ҷз·ҙ 12е ӮиӘІ',amount:21600,category:'еҒҘеә·',icon:'рҹ’Ә',included:false},
  {id:'o6',name:'з¶ІзҗғжӢҚ',amount:7200,category:'иҲҲи¶Ј',icon:'рҹҺҫ',included:false},
];
const CAT_COLOR={еҝ…иҰҒ:'#8B7355',жҠ•иіҮ:'#6B8F71',еҒҘеә·:'#9B7E6E',иҲҲи¶Ј:'#7B8FA1',е…¶д»–:'#A0927A'};

function fmt(n){return'NT$ '+Number(n).toLocaleString('zh-TW');}
function uid(){return'i'+Date.now()+Math.random().toString(36).slice(2,5);}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return el;
}

const stored=loadData();
let state={
  incomes: stored.incomes ?? [{id:'i1',source:'иіҮйҒЈиІ»',amount:440000,date:'2026-04-30'}],
  fixed:   stored.fixed   ?? JSON.parse(JSON.stringify(DEF_FIXED)),
  optional:stored.optional?? JSON.parse(JSON.stringify(DEF_OPT)),
  notes:   stored.notes   ?? [],
  config:  stored.config  ?? {token:'', gistId:'', monthlyBudget:70000},
  tab:'overview',

  showIncomeForm:false, incomeInput:{source:'',amount:'',date:todayStr()},
  delIncome:null,

  syncMsg:'',
};

function persist(){

    incomes:state.incomes,fixed:state.fixed,optional:state.optional,
    notes:state.notes,config:state.config,

}

function render(){const app=document.getElementById('app');app.innerHTML='';app.appendChild(buildApp());}

// в”Җв”Җ Gist Sync в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function gistPayload(){
  return JSON.stringify({
    incomes:state.incomes,fixed:state.fixed,
    optional:state.optional,notes:state.notes,
    updatedAt:new Date().toISOString(),
  },null,2);
}

async function findOrCreateGist(token){
  // жҗңе°Ӣе·Іжңүзҡ„ Gist
  let page=1;
  while(page<=5){
    const r=await fetch(`https://api.github.com/gists?per_page=100&page=${page}`,
      {headers:{Authorization:`token ${token}`,Accept:'application/vnd.github+json'}});
    if(!r.ok)break;
    const list=await r.json();
    const found=list.find(g=>g.files&&g.files[GIST_FILENAME]);
    if(found)return found.id;
    if(list.length<100)break;
    page++;
  }
  // жІ’жүҫеҲ°пјҢе»әз«Ӣж–°зҡ„
  const r=await fetch('https://api.github.com/gists',{
    method:'POST',
    headers:{Authorization:`token ${token}`,'Content-Type':'application/json',Accept:'application/vnd.github+json'},
    body:JSON.stringify({description:'Bella Budget Data',public:false,files:{[GIST_FILENAME]:{content:gistPayload()}}}),
  });
  if(!r.ok)throw new Error('е»әз«Ӣ Gist еӨұж•—');
  const g=await r.json();
  return g.id;
}

async function pushGist(){
  const {token,gistId}=state.config;
  if(!token||!gistId)return;
  await fetch(`https://api.github.com/gists/${gistId}`,{
    method:'PATCH',
    headers:{Authorization:`token ${token}`,'Content-Type':'application/json',Accept:'application/vnd.github+json'},
    body:JSON.stringify({files:{[GIST_FILENAME]:{content:gistPayload()}}}),
  });
}

async function pullGist(){
  const {token,gistId}=state.config;
  if(!token||!gistId)return null;
  const r=await fetch(`https://api.github.com/gists/${gistId}`,
    {headers:{Authorization:`token ${token}`,Accept:'application/vnd.github+json'}});
  if(!r.ok)return null;
  const g=await r.json();
  const raw=g.files[GIST_FILENAME]?.content;
  if(!raw)return null;
  return JSON.parse(raw);
}

async function handleConnect(){
  const token=state.config.token.trim();
  if(!token){alert('и«Ӣе…ҲеЎ«е…Ҙ GitHub Token');return;}
  state.syncStatus='syncing';state.syncMsg='йҖЈз·ҡдёӯвҖҰ';render();
  try{
    const gistId=await findOrCreateGist(token);
    state.config={...state.config,token,gistId};
    // еҳ—и©Ұеҫһ Gist жӢүеҸ–иіҮж–ҷ
    const remote=await pullGist();
    if(remote&&remote.incomes){
      state.incomes=remote.incomes;
      state.fixed=remote.fixed??state.fixed;
      state.optional=remote.optional??state.optional;
      state.notes=remote.notes??state.notes;
    }else{
      // йҰ–ж¬ЎпјҡжҠҠжң¬ең°иіҮж–ҷжҺЁдёҠеҺ»
      await pushGist();
    }
    persist();
    state.syncStatus='ok';state.syncMsg='е·ІйҖЈз·ҡ';
  }catch(e){
    state.syncStatus='error';state.syncMsg=e.message;
  }
  render();
}

async function handlePull(){
  state.syncStatus='syncing';state.syncMsg='еҗҢжӯҘдёӯвҖҰ';render();
  try{
    const remote=await pullGist();
    if(remote&&remote.incomes){
      state.incomes=remote.incomes;
      state.fixed=remote.fixed??state.fixed;
      state.optional=remote.optional??state.optional;
      state.notes=remote.notes??state.notes;
      persist();
      state.syncStatus='ok';state.syncMsg='е·ІеҗҢжӯҘ';
    }else{
      state.syncStatus='error';state.syncMsg='Gist з„ЎиіҮж–ҷ';
    }
  }catch(e){state.syncStatus='error';state.syncMsg=e.message;}
  render();
}

async function persistAndSync(){
  persist();
  if(state.config.token&&state.config.gistId){
    try{await pushGist();}catch(e){console.warn('Gist еҗҢжӯҘеӨұж•—',e);}
  }
}

// в”Җв”Җ Export / Import в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function exportJSON(){
  const data={incomes:state.incomes,fixed:state.fixed,optional:state.optional,notes:state.notes,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();
  a.href=url;a.download=`bella-budget-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();URL.revokeObjectURL(url);
}

function importJSON(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!d.incomes)throw new Error('ж јејҸдёҚз¬Ұ');
        if(!confirm(`зўәе®ҡиҰҒеҢҜе…ҘдёҰиҰҶи“ӢзҸҫжңүиіҮж–ҷпјҹ\nпјҲжӯӨж“ҚдҪңз„Ўжі•еҫ©еҺҹпјү`))return;
        state.incomes=d.incomes;state.fixed=d.fixed??state.fixed;
        state.optional=d.optional??state.optional;state.notes=d.notes??state.notes;
        persistAndSync();render();
      }catch(err){alert('еҢҜе…ҘеӨұж•—пјҡ'+err.message);}
    };
    reader.readAsText(file);
  };
  input.click();
}

// в”Җв”Җ buildApp в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function buildApp(){
  const{incomes,fixed,optional,tab,syncStatus,syncMsg,config}=state;
  const budget=incomes.reduce((s,i)=>s+i.amount,0);
  const fixedTotal=fixed.reduce((s,i)=>s+i.amount,0);
  const optTotal=optional.filter(i=>i.included).reduce((s,i)=>s+i.amount,0);
  const paidTotal=fixed.filter(i=>i.paid).reduce((s,i)=>s+i.amount,0);
  const committed=fixedTotal+optTotal;
  const remaining=budget-committed;
  const pct=Math.min(budget>0?(committed/budget)*100:0,100);
  const danger=remaining<20000,warn=remaining<50000;
  const wrap=h('div',{});

  // Header
  const hdr=h('div',{className:'header'});
  hdr.appendChild(h('div',{className:'circle',style:{top:'-20px',right:'-20px',width:'120px',height:'120px'}}));
  hdr.appendChild(h('div',{className:'circle',style:{bottom:'-30px',left:'-10px',width:'80px',height:'80px'}}));
  hdr.appendChild(h('div',{className:'sub'},"BELLA'S FUND"));
  hdr.appendChild(h('div',{className:'title'},'иІқжӢүзҡ„е®Үе®ҷиЁӮе–®'));
  hdr.appendChild(h('div',{className:'subtitle'},currentMonthLabel()+' В· йҮҚе•ҹиЁҲеҠғ'));

  const cards=h('div',{className:'cards'});
  const bc=h('div',{className:'hcard'});bc.appendChild(h('div',{className:'hlabel'},'зёҪиіҮйҮ‘'));bc.appendChild(h('div',{className:'hval'},fmt(budget)));cards.appendChild(bc);
  const bc2=h('div',{className:'hcard'});bc2.appendChild(h('div',{className:'hlabel'},'е·ІиҰҸеҠғ'));bc2.appendChild(h('div',{className:'hval'},fmt(committed)));cards.appendChild(bc2);
  const bc3=h('div',{className:'hcard'+(danger?' danger':warn?' warn':'')});bc3.appendChild(h('div',{className:'hlabel'},'еү©йӨҳ'));bc3.appendChild(h('div',{className:'hval'},fmt(remaining)));cards.appendChild(bc3);
  hdr.appendChild(cards);

  const pw=h('div',{className:'prog-wrap'});
  const pi=h('div',{className:'prog-info'});
  pi.appendChild(h('span',{},'ж”ҜеҮәжҜ”дҫӢ'));pi.appendChild(h('span',{},pct.toFixed(1)+'%'));pw.appendChild(pi);
  const pbg=h('div',{className:'prog-bg'});
  pbg.appendChild(h('div',{className:'prog-fill',style:{width:pct+'%',background:danger?'#FF6B6B':pct>70?'#F0C060':'#A8D5A2'}}));
  pw.appendChild(pbg);hdr.appendChild(pw);

  // Sync badge
  const syncLabel = config.gistId
    ? (syncStatus==='syncing'?'вҹі еҗҢжӯҘдёӯвҖҰ':syncStatus==='error'?'вң• еҗҢжӯҘеӨұж•—':'вң“ е·ІйҖЈз·ҡ Gist')
    : 'в—Ӣ жңӘйҖЈз·ҡ';
  const syncCls = config.gistId
    ? (syncStatus==='syncing'?'ing':syncStatus==='error'?'err':'ok')
    : 'off';
  const sr=h('div',{className:'sync-row'});
  sr.appendChild(h('span',{className:`sync-badge ${syncCls}`},syncLabel));
  hdr.appendChild(sr);
  wrap.appendChild(hdr);

  // Tabs
  const tabsDiv=h('div',{className:'tabs'});
  [['overview','зёҪиҰҪ'],['income','ж”¶е…Ҙ'],['fixed','еҝ…иҰҒ'],['optional','йЎҚеӨ–'],['note','еӮҷеҝҳ'],['settings','вҡҷпёҸ']].forEach(([k,l])=>{
    tabsDiv.appendChild(h('button',{className:'tab-btn'+(tab===k?' active':''),onClick:()=>{state.tab=k;state.fui=null;state.oui=null;render();}},l));
  });
  wrap.appendChild(tabsDiv);

  const ct=h('div',{className:'content'});
  if(tab==='overview') ct.appendChild(buildOverview(fixedTotal,optTotal,paidTotal,committed,remaining,budget));
  if(tab==='income')   ct.appendChild(buildIncome(budget));
  if(tab==='fixed')    ct.appendChild(buildFixed(fixedTotal));
  if(tab==='optional') ct.appendChild(buildOptional(optTotal,remaining));
  if(tab==='note')     ct.appendChild(buildNote());
  if(tab==='settings') ct.appendChild(buildSettings());
  ct.appendChild(h('div',{className:'ver'},'v2.0'));
  wrap.appendChild(ct);return wrap;
}

// в”Җв”Җ Overview в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function buildOverview(fixedTotal,optTotal,paidTotal,committed,remaining,budget){
  const{optional,config}=state;const div=h('div',{});
  div.appendChild(sT('рҹ’° иіҮйҮ‘еҲҶй…ҚдёҖиҰҪ'));
  const c1=h('div',{className:'card'});
  const cm=new Date().getMonth()+1;
  c1.appendChild(rw('еҝ…иҰҒж”ҜеҮәпјҲ'+cm+'жңҲпјү',fmt(fixedTotal),'#8B7355',true));
  c1.appendChild(rw('гҖҖе·Ід»ҳжё…',fmt(paidTotal),'#6B8F71'));
  c1.appendChild(rw('гҖҖеҫ…з№ізҙҚ',fmt(fixedTotal-paidTotal),'#9B7E6E'));
  div.appendChild(c1);
  const c2=h('div',{className:'card'});
  c2.appendChild(rw('йЎҚеӨ–иҰҸеҠғпјҲе·ІйҒёпјү',fmt(optTotal),'#8B7355',true));
  const sel=optional.filter(i=>i.included);
  if(!sel.length)c2.appendChild(h('div',{style:{fontSize:'12px',color:'#A09080',padding:'4px 0'}},'е°ҡжңӘйҒёеҸ–д»»дҪ•йЎҚеӨ–ж”ҜеҮә'));
  else sel.forEach(i=>c2.appendChild(rw('гҖҖ'+i.icon+' '+i.name,fmt(i.amount),CAT_COLOR[i.category]||'#8B7355')));
  div.appendChild(c2);
  const c3=h('div',{className:'card',style:{background:remaining<0?'#FFF0F0':'#F0F7F0',border:'1px solid '+(remaining<0?'#FFCCC0':'#C0DFC0')}});
  c3.appendChild(rw('рҹ’ј зёҪиҰҸеҠғж”ҜеҮә',fmt(committed),'#3D2E1E',true));
  c3.appendChild(rw('рҹҸҰ еү©йӨҳжңӘиҰҸеҠғ',fmt(remaining),remaining<0?'#CC3333':'#2E7D32',true));
  div.appendChild(c3);
  if(remaining<20000)div.appendChild(h('div',{className:'warn-banner'},'вҡ пёҸ еү©йӨҳиіҮйҮ‘дҪҺж–ј 2 иҗ¬пјҢе»әиӯ°йҮҚж–°жӘўиҰ–ж”ҜеҮәгҖӮ'));

  const MONTHLY=config.monthlyBudget||70000;
  const months=remaining/MONTHLY;
  const mColor=months<3?'#CC3333':months<6?'#B8860B':'#2E7D32';
  const mBg=months<3?'#FFF0F0':months<6?'#FFFBE6':'#F0F7F0';
  const mBorder=months<3?'#FFAAAA':months<6?'#F0D080':'#C0DFC0';
  const mIcon=months<3?'рҹ”ҙ':months<6?'рҹҹЎ':'рҹҹў';
  const mBox=h('div',{style:{background:mBg,border:`1px solid ${mBorder}`,borderRadius:'12px',padding:'12px 16px',marginTop:'12px'}});
  mBox.appendChild(h('div',{style:{fontSize:'12px',color:'#8B7355',marginBottom:'6px'}},`рҹ—“ д»ҘжҜҸжңҲ ${fmt(MONTHLY)} ж—Ҙеёёз”ЁеәҰиЁҲз®—`));
  const mRow=h('div',{style:{display:'flex',alignItems:'baseline',gap:'6px'}});
  mRow.appendChild(h('span',{style:{fontSize:'13px',color:'#5A4A3A'}},'йӮ„еҸҜд»ҘдҪҝз”Ё'));
  mRow.appendChild(h('span',{style:{fontSize:'22px',fontWeight:'bold',color:mColor}},(months>=0?months.toFixed(1):'0')));
  mRow.appendChild(h('span',{style:{fontSize:'13px',color:'#5A4A3A'}},'еҖӢжңҲ'));
  mRow.appendChild(h('span',{style:{fontSize:'16px',marginLeft:'4px'}},mIcon));
  mBox.appendChild(mRow);
  if(months<3)mBox.appendChild(h('div',{style:{fontSize:'12px',color:'#CC3333',marginTop:'6px'}},'вҡ пёҸ иіҮйҮ‘еҒҸдҪҺпјҢе»әиӯ°и¬№ж…Һж”ҜеҮә'));
  else if(months<6)mBox.appendChild(h('div',{style:{fontSize:'12px',color:'#B8860B',marginTop:'6px'}},'з•ҷж„Ҹж”ҜеҮәзҜҖеҘҸпјҢжҢҒзәҢй—ңжіЁиіҮйҮ‘зӢҖжіҒ'));
  else mBox.appendChild(h('div',{style:{fontSize:'12px',color:'#2E7D32',marginTop:'6px'}},'иіҮйҮ‘е……иЈ•пјҢдҝқжҢҒиүҜеҘҪиҰҸеҠғзҝ’ж…Ј вңЁ'));
  div.appendChild(mBox);

  div.appendChild(sT('рҹ“Ҡ ж”ҜеҮәеҲҶйЎһ',{marginTop:'20px'}));
  const cats=optional.filter(i=>i.included).reduce((acc,i)=>{acc[i.category]=(acc[i.category]||0)+i.amount;return acc;},{еҝ…иҰҒ:fixedTotal});
  Object.entries(cats).forEach(([cat,amt])=>{
    const bw=h('div',{style:{marginBottom:'8px'}});
    const bl=h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'13px',marginBottom:'4px'}});
    bl.appendChild(h('span',{style:{color:CAT_COLOR[cat]||'#8B7355'}},'в–  '+cat));
    bl.appendChild(h('span',{style:{fontWeight:'bold'}},fmt(amt)));
    bw.appendChild(bl);
    const bg=h('div',{className:'bar-bg'});
    bg.appendChild(h('div',{className:'bar-fill',style:{width:Math.min((amt/budget)*100,100)+'%',background:CAT_COLOR[cat]||'#8B7355'}}));
    bw.appendChild(bg);div.appendChild(bw);
  });
  return div;
}

// в”Җв”Җ Income в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function buildIncome(budget){
  const{incomes,showIncomeForm,incomeInput,delIncome}=state;
  const div=h('div',{});
  div.appendChild(sT('рҹ’ө ж”¶е…ҘзҙҖйҢ„'));
  div.appendChild(h('div',{style:{fontSize:'12px',color:'#A09080',marginBottom:'12px'}},'жүҖжңүж”¶е…ҘеҠ зёҪеҚізӮәзёҪиіҮйҮ‘'));
  incomes.forEach(item=>{
    if(delIncome===item.id){
      const dc=h('div',{className:'del-confirm'});
      dc.appendChild(h('div',{style:{marginBottom:'8px'}},'зўәе®ҡеҲӘйҷӨгҖҢ'+item.source+'гҖҚпјҹ'));
      const br=h('div',{className:'btn-row'});
      br.appendChild(h('button',{className:'btn btn-red',onClick:()=>{state.incomes=state.incomes.filter(i=>i.id!==item.id);state.delIncome=null;persistAndSync();render();}},'зўәиӘҚеҲӘйҷӨ'));
      br.appendChild(h('button',{className:'btn btn-gray',onClick:()=>{state.delIncome=null;render();}},'еҸ–ж¶Ҳ'));
      dc.appendChild(br);div.appendChild(dc);
    }else{
      const ic=h('div',{className:'income-card'});
      ic.appendChild(h('div',{style:{fontSize:'22px'}},'рҹ’°'));
      const body=h('div',{style:{flex:1,minWidth:0}});
      body.appendChild(h('div',{className:'income-source'},item.source));
      body.appendChild(h('div',{className:'income-date'},item.date));
      ic.appendChild(body);
      ic.appendChild(h('div',{className:'income-amt'},fmt(item.amount)));
      ic.appendChild(h('button',{className:'icon-btn',onClick:()=>{state.delIncome=item.id;render();}},'рҹ—‘'));
      div.appendChild(ic);
    }
  });
  if(showIncomeForm){
    const box=h('div',{className:'form-box'});
    box.appendChild(h('div',{style:{fontSize:'12px',color:'#8B6914',fontWeight:'bold',marginBottom:'10px'}},'ж–°еўһж”¶е…Ҙ'));
    const srcInp=h('input',{type:'text',className:'field',placeholder:'ж”¶е…ҘдҫҶжәҗпјҲдҫӢпјҡиіҮйҒЈиІ»гҖҒи–Әж°ҙгҖҒзҚҺйҮ‘пјү',value:incomeInput.source});
    srcInp.addEventListener('input',e=>{state.incomeInput={...state.incomeInput,source:e.target.value};});
    box.appendChild(srcInp);
    const amtInp=h('input',{type:'number',className:'field',placeholder:'йҮ‘йЎҚпјҲе…ғпјү',value:incomeInput.amount});
    amtInp.style.marginTop='8px';
    amtInp.addEventListener('input',e=>{state.incomeInput={...state.incomeInput,amount:e.target.value};});
    box.appendChild(amtInp);
    const dateInp=h('input',{type:'date',className:'field',value:incomeInput.date});
    dateInp.style.marginTop='8px';
    dateInp.addEventListener('input',e=>{state.incomeInput={...state.incomeInput,date:e.target.value};});
    box.appendChild(dateInp);
    const br=h('div',{className:'btn-row'});
    br.appendChild(h('button',{className:'btn btn-gold',onClick:()=>{
      const src=state.incomeInput.source.trim();const amt=parseInt(state.incomeInput.amount);const dt=state.incomeInput.date;
      if(!src||!amt||amt<=0)return;
      state.incomes.push({id:uid(),source:src,amount:amt,date:dt});
      state.showIncomeForm=false;state.incomeInput={source:'',amount:'',date:todayStr()};
      persistAndSync();render();
    }},'вң“ е„Іеӯҳ'));
    br.appendChild(h('button',{className:'btn btn-gray',onClick:()=>{state.showIncomeForm=false;render();}},'еҸ–ж¶Ҳ'));
    box.appendChild(br);setTimeout(()=>srcInp.focus(),50);div.appendChild(box);
  }else{
    div.appendChild(h('button',{className:'add-btn',onClick:()=>{state.showIncomeForm=true;render();}},'пјӢ ж–°еўһж”¶е…Ҙ'));
  }
  const sb=h('div',{className:'sum-bar',style:{display:'flex',justifyContent:'space-between'}});
  sb.appendChild(h('span',{style:{fontWeight:'bold'}},'зёҪиіҮйҮ‘еҗҲиЁҲ'));
  sb.appendChild(h('span',{style:{fontWeight:'bold',fontSize:'16px',color:'#2E7D32'}},fmt(budget)));
  div.appendChild(sb);return div;
}

// в”Җв”Җ Fixed в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function buildFixed(fixedTotal){
  const{fixed,fui}=state;const div=h('div',{});
  const m=new Date().getMonth()+1;
  div.appendChild(sT('рҹ“Ӣ '+m+'жңҲеҝ…иҰҒж”ҜеҮә'));
  div.appendChild(h('div',{style:{fontSize:'12px',color:'#A09080',marginBottom:'12px'}},'й»һ вң“ е·Ід»ҳжё… пјҸ вңҸпёҸ дҝ®ж”№ пјҸ рҹ—‘ еҲӘйҷӨ'));
  fixed.forEach(item=>{
    const editing=fui?.id===item.id&&fui?.mode==='edit';

    else div.appendChild(buildItemRow(item,true));
  });
  if(fui?.mode==='add'&&!fui?.id)div.appendChild(buildItemForm(null,data=>{state.fixed.push({id:uid(),...data,paid:false});state.fui=null;persistAndSync();render();},()=>{state.fui=null;render();}));
  else div.appendChild(h('button',{className:'add-btn',onClick:()=>{state.fui={mode:'add'};render();}},'пјӢ ж–°еўһеҝ…иҰҒж”ҜеҮә'));

  sb.appendChild(h('span',{},'еҝ…иҰҒж”ҜеҮәе°ҸиЁҲ'));sb.appendChild(h('span',{style:{fontWeight:'bold',color:'#8B6914'}},fmt(fixedTotal)));

// в”Җв”Җ Optional в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  hint.appendChild(document.createTextNode('й»һ вң“ зҙҚе…Ҙй җз®— пјҸ вңҸпёҸ дҝ®ж”№ пјҸ рҹ—‘ еҲӘйҷӨ В· еү©йӨҳ '));

  div.appendChild(hint);
  optional.forEach(item=>{
    const editing=oui?.id===item.id&&oui?.mode==='edit';

    if(editing)div.appendChild(buildItemForm(item,data=>{state.optional=state.optional.map(i=>i.id===item.id?{...i,...data}:i);state.oui=null;persistAndSync();render();},()=>{state.oui=null;render();}));
    else if(deling)div.appendChild(buildDelConfirm(item.name,()=>{state.optional=state.optional.filter(i=>i.id!==item.id);state.oui=null;persistAndSync();render();},()=>{state.oui=null;render();}));
    else div.appendChild(buildItemRow(item,false));
  });
  if(oui?.mode==='add'&&!oui?.id)div.appendChild(buildItemForm(null,data=>{state.optional.push({id:uid(),...data,included:false});state.oui=null;persistAndSync();render();},()=>{state.oui=null;render();}));
  else div.appendChild(h('button',{className:'add-btn',onClick:()=>{state.oui={mode:'add'};render();}},'пјӢ ж–°еўһйЎҚеӨ–й …зӣ®'));
  const sb=h('div',{className:'sum-bar'});
  const r1=h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'6px'}});
  r1.appendChild(h('span',{},'йЎҚеӨ–ж”ҜеҮәе°ҸиЁҲпјҲе·ІйҒёпјү'));r1.appendChild(h('span',{style:{fontWeight:'bold',color:'#8B6914'}},fmt(optTotal)));sb.appendChild(r1);
  const r2=h('div',{style:{display:'flex',justifyContent:'space-between'}});
  r2.appendChild(h('span',{style:{fontWeight:'bold'}},'иҰҸеҠғеҫҢеү©йӨҳ'));r2.appendChild(h('span',{style:{fontWeight:'bold',fontSize:'16px',color:remaining<0?'#CC3333':'#2E7D32'}},fmt(remaining)));sb.appendChild(r2);
  div.appendChild(sb);return div;
}

// в”Җв”Җ Note в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function buildNote(){
  const{notes,noteInput,delNote}=state;const div=h('div',{});
  div.appendChild(sT('рҹ“қ ж–°еўһеӮҷеҝҳ'));
  const inputBox=h('div',{style:{background:'#FAF5EE',border:'1px solid #D4C4B0',borderRadius:'14px',padding:'14px',marginBottom:'16px'}});
  const ta=h('textarea',{placeholder:'дҫӢеҰӮпјҡ\nгғ»еүҜд№іжүӢиЎ“е…Ҳи©ўе•Ҹ3й–“иЁәжүҖе ұеғ№\nгғ»0050зӯүеёӮе ҙеӣһжӘ”еҶҚйҖІе ҙ\nгғ»еҒҘиә«ж•ҷз·ҙе…Ҳи©ҰдёҠ2е ӮеҶҚжұәе®ҡ'});
  Object.assign(ta.style,{width:'100%',minHeight:'110px',border:'1px solid #E0CDB8',borderRadius:'10px',padding:'12px',background:'#FFF8EE',fontSize:'14px',color:'#3D2E1E',resize:'vertical',outline:'none',lineHeight:'1.8',boxSizing:'border-box'});
  ta.value=noteInput;
  const sendBtn=h('button',{});
  Object.assign(sendBtn.style,{marginTop:'10px',width:'100%',padding:'11px 0',border:'none',borderRadius:'10px',fontSize:'14px',fontWeight:'bold',letterSpacing:'1px'});
  function updBtn(){const has=state.noteInput.trim().length>0;sendBtn.style.background=has?'linear-gradient(135deg,#8B6914,#A0805A)':'#D4C4B0';sendBtn.style.color=has?'#FFF8EE':'#A09080';sendBtn.style.cursor=has?'pointer':'not-allowed';}
  ta.addEventListener('input',e=>{state.noteInput=e.target.value;updBtn();});
  updBtn();sendBtn.textContent='вңҰ йҖҒеҮәиЁҳйҢ„';
  sendBtn.addEventListener('click',()=>{if(!state.noteInput.trim())return;state.notes.unshift({id:uid(),text:state.noteInput.trim(),time:nowStr()});state.noteInput='';persistAndSync();render();});
  inputBox.appendChild(ta);inputBox.appendChild(sendBtn);div.appendChild(inputBox);
  if(notes.length>0){
    div.appendChild(sT('рҹ—Ӯ еӮҷеҝҳзҙҖйҢ„пјҲ'+notes.length+'пјү'));
    notes.forEach(n=>{
      if(delNote===n.id){
        const dc=h('div',{className:'del-confirm'});
        dc.appendChild(h('div',{style:{marginBottom:'8px'}},'зўәе®ҡеҲӘйҷӨжӯӨеӮҷеҝҳпјҹ'));
        const br=h('div',{className:'btn-row'});
        br.appendChild(h('button',{className:'btn btn-red',onClick:()=>{state.notes=state.notes.filter(x=>x.id!==n.id);state.delNote=null;persistAndSync();render();}},'еҲӘйҷӨ'));
        br.appendChild(h('button',{className:'btn btn-gray',onClick:()=>{state.delNote=null;render();}},'еҸ–ж¶Ҳ'));
        dc.appendChild(br);div.appendChild(dc);
      }else{
        const nc=h('div',{className:'note-card-filled'});
        const top=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}});
        top.appendChild(h('span',{className:'note-time'},'рҹ•җ '+n.time));
        top.appendChild(h('button',{className:'note-del-btn',onClick:()=>{state.delNote=n.id;render();}},'рҹ—‘'));
        nc.appendChild(top);nc.appendChild(h('div',{className:'note-text'},n.text));div.appendChild(nc);
      }
    });
  }else{
    div.appendChild(h('div',{style:{textAlign:'center',color:'#B0A090',fontSize:'13px',padding:'24px 0'}},'е°ҡз„ЎеӮҷеҝҳиЁҳйҢ„пјҢеЎ«еҜ«еҫҢй»һгҖҢйҖҒеҮәиЁҳйҢ„гҖҚ'));
  }
  div.appendChild(sT('рҹ’Ў иҠұиІ»иҮӘеҫӢе°ҸжҸҗзӨә',{marginTop:'20px'}));
  TIPS.forEach(t=>{const tr=h('div',{className:'tip-row'});tr.appendChild(h('span',{style:{color:'#C8A87A',flexShrink:'0'}},'в—Ҷ'));tr.appendChild(h('span',{},t));div.appendChild(tr);});
  return div;
}

// в”Җв”Җ Settings в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function buildSettings(){
  const{config}=state;const div=h('div',{});
  div.appendChild(sT('вҡҷпёҸ иЁӯе®ҡ'));

  // Gist еҗҢжӯҘ
  const gistBlock=h('div',{className:'setting-block'});
  gistBlock.appendChild(h('span',{className:'setting-label'},'GitHub Gist и·ЁиЈқзҪ®еҗҢжӯҘ'));
  if(config.gistId){
    const st=h('div',{className:'gist-status connected'});
    st.appendChild(h('span',{},'вң“ е·ІйҖЈз·ҡ'));
    st.appendChild(h('span',{style:{fontSize:'11px',color:'#5A7A5A',marginLeft:'4px',wordBreak:'break-all'}},config.gistId.slice(0,16)+'вҖҰ'));
    gistBlock.appendChild(st);
    const pullBtn=h('button',{className:'setting-btn setting-btn-green',onClick:handlePull},'вҹі з«ӢеҚіеҫһ Gist еҗҢжӯҘ');
    gistBlock.appendChild(pullBtn);
    const discBtn=h('button',{className:'setting-btn setting-btn-gray',style:{marginTop:'6px'},onClick:()=>{
      if(!confirm('зўәе®ҡдёӯж–· Gist йҖЈз·ҡпјҹпјҲжң¬ж©ҹиіҮж–ҷдёҚеҸ—еҪұйҹҝпјү'))return;
      state.config={...state.config,gistId:''};persist();render();
    }},'дёӯж–·йҖЈз·ҡ');
    gistBlock.appendChild(discBtn);
  }else{
    const st=h('div',{className:'gist-status disconnected'});
    st.appendChild(h('span',{},'в—Ӣ е°ҡжңӘйҖЈз·ҡ'));
    gistBlock.appendChild(st);
    gistBlock.appendChild(h('span',{className:'setting-label',style:{marginTop:'10px'}},'GitHub Token'));
    const tokenInp=h('input',{type:'password',className:'field',placeholder:'ghp_ жҲ– gho_ й–Ӣй ӯзҡ„ Token',value:config.token});
    tokenInp.addEventListener('input',e=>{state.config={...state.config,token:e.target.value};});
    gistBlock.appendChild(tokenInp);
    gistBlock.appendChild(h('div',{className:'setting-hint'},'Token йңҖиҰҒ gist и®ҖеҜ«ж¬ҠйҷҗпјҢе„ІеӯҳеңЁжң¬ж©ҹдёҚжңғдёҠеӮіеҲ° GitHubгҖӮ'));
    const connectBtn=h('button',{className:'setting-btn setting-btn-gold',style:{marginTop:'10px'},onClick:handleConnect},'рҹ”— йҖЈз·ҡдёҰеҗҢжӯҘ');
    gistBlock.appendChild(connectBtn);
  }
  div.appendChild(gistBlock);

  // жҜҸжңҲиҠұиІ»иЁӯе®ҡ
  const budgetBlock=h('div',{className:'setting-block'});
  budgetBlock.appendChild(h('span',{className:'setting-label'},'жҜҸжңҲж—ҘеёёиҠұиІ»еҹәжә–'));
  const budgetInp=h('input',{type:'number',className:'field',placeholder:'70000',value:String(config.monthlyBudget||70000)});
  budgetInp.addEventListener('input',e=>{state.config={...state.config,monthlyBudget:parseInt(e.target.value)||70000};});
  budgetBlock.appendChild(budgetInp);
  budgetBlock.appendChild(h('div',{className:'setting-hint'},'з”Ёж–јгҖҢзёҪиҰҪгҖҚиЁҲз®—еү©йӨҳиіҮйҮ‘еҸҜдҪҝз”Ёе№ҫеҖӢжңҲпјҢй җиЁӯ 70,000гҖӮ'));
  const saveSettingBtn=h('button',{className:'setting-btn setting-btn-gold',onClick:()=>{persistAndSync();render();}}, 'вң“ е„ІеӯҳиЁӯе®ҡ');
  budgetBlock.appendChild(saveSettingBtn);
  div.appendChild(budgetBlock);

  // еҢҜеҮә / еҢҜе…Ҙ
  const ioBlock=h('div',{className:'setting-block'});
  ioBlock.appendChild(h('span',{className:'setting-label'},'иіҮж–ҷеӮҷд»Ҫ'));
  const expBtn=h('button',{className:'setting-btn setting-btn-green',onClick:exportJSON},'рҹ“Ҙ еҢҜеҮә JSON еӮҷд»Ҫ');
  ioBlock.appendChild(expBtn);
  const impBtn=h('button',{className:'setting-btn setting-btn-gray',style:{marginTop:'8px'},onClick:importJSON},'рҹ“Ө еҢҜе…Ҙ JSON йӮ„еҺҹ');
  ioBlock.appendChild(impBtn);
  ioBlock.appendChild(h('div',{className:'setting-hint'},'еҢҜеҮәжңғдёӢијүдёҖеҖӢ .json жӘ”жЎҲеҲ°дҪ зҡ„иЈқзҪ®гҖӮеҢҜе…ҘжңғиҰҶи“ӢзҸҫжңүиіҮж–ҷпјҢж“ҚдҪңеүҚе»әиӯ°е…ҲеҢҜеҮәеӮҷд»ҪгҖӮ'));
  div.appendChild(ioBlock);

  // еҚұйҡӘеҚҖеҹҹ
  const dangerBlock=h('div',{className:'setting-block',style:{borderColor:'#FFAAAA',background:'#FFF8F8'}});
  dangerBlock.appendChild(h('span',{className:'setting-label',style:{color:'#CC4444'}},'еҚұйҡӘеҚҖеҹҹ'));
  const clrBtn=h('button',{className:'setting-btn setting-btn-red',onClick:()=>{
    if(confirm('зўәе®ҡиҰҒжё…йҷӨйҖҷеҸ°иЈқзҪ®дёҠзҡ„жүҖжңүиіҮж–ҷпјҹ\nпјҲGist еӮҷд»ҪдёҚеҸ—еҪұйҹҝпјү')){
      state.incomes=[];state.fixed=JSON.parse(JSON.stringify(DEF_FIXED));
      state.optional=JSON.parse(JSON.stringify(DEF_OPT));state.notes=[];
      persist();render();
    }
  }},'рҹ—‘ жё…йҷӨжң¬ж©ҹжүҖжңүиіҮж–ҷ');
  dangerBlock.appendChild(clrBtn);
  dangerBlock.appendChild(h('div',{className:'setting-hint'},'еҸӘжё…йҷӨйҖҷеҸ°иЈқзҪ®зҡ„иіҮж–ҷпјҢGist еӮҷд»ҪдёҚеҸ—еҪұйҹҝпјҢеҸҜдәӢеҫҢйҮҚж–°еҗҢжӯҘеӣһдҫҶгҖӮ'));
  div.appendChild(dangerBlock);
  return div;
}

// в”Җв”Җ Item Row в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function buildItemRow(item,isFixed){
  const checked=isFixed?item.paid:item.included;
  const ir=h('div',{className:'item-row',style:{
    background:isFixed?(checked?'#EDF5EC':'#FAF5EE'):(checked?'#FAF5EE':'#F5EFE6'),
    border:isFixed?`1px solid ${checked?'#B8D8B8':'#E0CDB8'}`:`2px solid ${checked?'#C8A87A':'#E0CDB8'}`,
    opacity:isFixed&&checked?'0.72':'1',
    boxShadow:!isFixed&&checked?'0 2px 8px rgba(139,105,20,0.12)':'none',
  }});
  ir.appendChild(h('button',{className:'check-btn',style:{background:checked?(isFixed?'#6B8F71':'#8B6914'):'#D4C4B0'},onClick:()=>{
    if(isFixed)state.fixed=state.fixed.map(i=>i.id===item.id?{...i,paid:!i.paid}:i);
    else state.optional=state.optional.map(i=>i.id===item.id?{...i,included:!i.included}:i);
    persistAndSync();render();
  }},checked?'вң“':''));
  ir.appendChild(h('div',{className:'item-icon'},item.icon));
  const body=h('div',{className:'item-body'});
  body.appendChild(h('div',{className:'item-name',style:{fontWeight:!isFixed&&checked?'bold':'normal',textDecoration:isFixed&&checked?'line-through':'none'}},item.name));
  body.appendChild(h('span',{className:'cat-badge',style:{background:CAT_COLOR[item.category]||'#A0927A'}},item.category));
  ir.appendChild(body);
  ir.appendChild(h('div',{className:'item-amt',style:{color:checked?(isFixed?'#6B8F71':'#8B6914'):(isFixed?'#3D2E1E':'#8B7355')}},fmt(item.amount)));
  ir.appendChild(h('button',{className:'icon-btn',onClick:e=>{e.stopPropagation();if(isFixed)state.fui={id:item.id,mode:'edit'};else state.oui={id:item.id,mode:'edit'};render();}},'вңҸпёҸ'));
  ir.appendChild(h('button',{className:'icon-btn',onClick:e=>{e.stopPropagation();if(isFixed)state.fui={id:item.id,mode:'delete'};else state.oui={id:item.id,mode:'delete'};render();}},'рҹ—‘'));
  return ir;
}

function buildItemForm(initial,onSave,onCancel){
  let selIcon=initial?.icon??'вңЁ';
  const box=h('div',{className:'form-box'});
  box.appendChild(h('div',{style:{fontSize:'12px',color:'#8B6914',fontWeight:'bold',marginBottom:'8px'}},'йҒёж“Үең–зӨә'));
  const grid=h('div',{className:'icon-grid'});const iconBtns={};
  ICONS.forEach(ic=>{
    const btn=h('button',{className:'icon-opt'+(ic===selIcon?' sel':''),onClick:()=>{selIcon=ic;Object.entries(iconBtns).forEach(([k,b])=>{b.className='icon-opt'+(k===ic?' sel':'');});}},ic);
    iconBtns[ic]=btn;grid.appendChild(btn);
  });
  box.appendChild(grid);
  const nameInp=h('input',{type:'text',className:'field',placeholder:'й …зӣ®еҗҚзЁұ',value:initial?.name??''});box.appendChild(nameInp);
  const amtInp=h('input',{type:'number',className:'field',placeholder:'йҮ‘йЎҚпјҲе…ғпјү',value:initial?.amount?String(initial.amount):''});amtInp.style.marginTop='8px';box.appendChild(amtInp);
  const catSel=h('select',{className:'field'});catSel.style.marginTop='8px';
  CATS.forEach(c=>{const o=h('option',{value:c},c);if(c===(initial?.category??'е…¶д»–'))o.selected=true;catSel.appendChild(o);});
  box.appendChild(catSel);
  const br=h('div',{className:'btn-row'});
  br.appendChild(h('button',{className:'btn btn-gold',onClick:()=>{const name=nameInp.value.trim();const amount=parseInt(amtInp.value);if(!name||!amount||amount<=0)return;onSave({name,amount,category:catSel.value,icon:selIcon});}},'вң“ е„Іеӯҳ'));
  br.appendChild(h('button',{className:'btn btn-gray',onClick:onCancel},'еҸ–ж¶Ҳ'));
  box.appendChild(br);setTimeout(()=>nameInp.focus(),50);return box;
}

function buildDelConfirm(name,onConfirm,onCancel){
  const box=h('div',{className:'del-confirm'});
  const msg=h('div',{style:{marginBottom:'10px'}});
  msg.appendChild(document.createTextNode('зўәе®ҡеҲӘйҷӨгҖҢ'));msg.appendChild(h('strong',{},name));msg.appendChild(document.createTextNode('гҖҚпјҹ'));
  box.appendChild(msg);
  const br=h('div',{className:'btn-row'});
  br.appendChild(h('button',{className:'btn btn-red',onClick:onConfirm},'зўәиӘҚеҲӘйҷӨ'));
  br.appendChild(h('button',{className:'btn btn-gray',onClick:onCancel},'еҸ–ж¶Ҳ'));
  box.appendChild(br);return box;
}

function sT(text,extraStyle={}){return h('div',{className:'sec-title',style:extraStyle},text);}
function rw(label,val,color,bold=false){
  const r=h('div',{className:'row'});
  r.appendChild(h('span',{style:{color:'#5A4A3A'}},label));
  r.appendChild(h('span',{style:{fontWeight:bold?'bold':'normal',color:color||'#3D2E1E'}},val));
  return r;
}

render();
// е•ҹеӢ•жҷӮиҮӘеӢ•еҫһ Gist жӢүеҸ–
if(state.config.token&&state.config.gistId){
  setTimeout(handlePull,600);
}
</script>
